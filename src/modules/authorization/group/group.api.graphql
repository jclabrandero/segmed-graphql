
type Group {
	id:				Int!
	name:			String!
	description:	String

	permissions:			[Permission!]!
	
	status:			Int!
}


input IGroupCreateArgs {
	name:			String!
	description:	String

	permissions:	[Int!]!
}

type Query {
	groups: [Group!]! @authorized
	activeGroups: [Group!]! @authorized
}

type Mutation {
	createGroup(data: IGroupCreateArgs!): Group! @authorized
}

type Subscription {
	groupCreated: Group!
	groupUpdated: Group!
	groupDeleted: Group!
	groupUpserted: Group!
}
