
type Group {
	id:				Int!
	name:			String!
	description:	String

	members:		[User!]!
	permissions:	[Permission!]!
	
	status:			Int!
}


input IGroupCreateArgs {
	name:			String!
	description:	String

	permissions:	[Int!]!
}

input IGroupUpdateArgs {
	name:			String
	description:	String

	permissions:	[Int!]
}

type Query {
	groups: [Group!]! @authorized @has(permissions: [ReadGroup])
	activeGroups: [Group!]! @authorized @has(permissions: [ReadGroup])
	group(id: Int!): Group! @authorized @has(permissions: [ReadGroup])
}

type Mutation {
	createGroup(data: IGroupCreateArgs!): Group! @authorized @has(permissions: [WriteGroup])
	updateGroup(id: Int!, data: IGroupUpdateArgs!): Group! @authorized @has(permissions: [WriteGroup])
}

type Subscription {
	groupCreated: Group!
	groupUpdated: Group!
	groupDeleted: Group!
	groupUpserted: Group!
}
