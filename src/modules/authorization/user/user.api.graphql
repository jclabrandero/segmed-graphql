
type User {
	id:				Int!
	userName:		String!
	displayName:	String
	email:			String

	isAuthorized:	Boolean!
	
	status:			Int!

	groups:			[Group!]!
	permissions:	[String!]!
	clerk:			Clerk
}


input IUserCreateArgs {
	userName:			String!
	displayName:		String
	email:				String

	groups:				[Int!]

	password:			String
	confirmPassword:	String

	clerkId:			Int
}

input IUserUpdateArgs {
	displayName:		String
	email:				String

	groups:				[Int!]

	password:			String
	confirmPassword:	String

	clerkId:			Int
}

type Query {
	users: [User!]! @authorized
	currentUser(sessionId: Int!): User! @authorized
	user(id: Int!): User! @authorized
	userByUserName(userName: String!): User! @authorized
}

type Mutation {
	createUser(data: IUserCreateArgs!): User! @authorized
	updateUser(id: Int!, data: IUserUpdateArgs!): User! @authorized
}

type Subscription {
	userCreated: User!
	userUpdated: User!
	userDeleted: User!
	userUpserted: User!
}
