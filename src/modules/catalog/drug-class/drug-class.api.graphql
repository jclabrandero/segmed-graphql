
type DrugClass {
	id:				Int!
	name:			String!
	description:	String
	
	status:			Int!

	medications:	[Medication!]!
}


input IDrugClassCreateArgs {
	name:			String!
	description:	String
}

input IDrugClassUpdateArgs {
	name:			String
	description:	String
}

type Query {
	drugClasess: [DrugClass!]! @authorized @has(permissions: [ReadDrugClass])
	activeDrugClasess: [DrugClass!]! @authorized @has(permissions: [ReadDrugClass])
	drugClass(id: Int!): DrugClass! @authorized @has(permissions: [ReadDrugClass])
}

type Mutation {
	createDrugClass(data: IDrugClassCreateArgs!): DrugClass! @authorized @has(permissions: [WriteDrugClass])
	updateDrugClass(id: Int!, data: IDrugClassUpdateArgs!): DrugClass! @authorized @has(permissions: [WriteDrugClass])
	deleteDrugClass(id: Int!): DrugClass! @authorized @has(permissions: [WriteDrugClass])
}

type Subscription {
	drugClassCreated: DrugClass!
	drugClassUpdated: DrugClass!
	drugClassDeleted: DrugClass!
	drugClassUpserted: DrugClass!
}
