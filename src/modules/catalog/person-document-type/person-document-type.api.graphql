
type PersonDocumentType {
	id:				Int!
	name:			String!
	description:	String
	
	status:			Int!
}


input IPersonDocumentTypeCreateArgs {
	name:			String!
	description:	String
}

input IPersonDocumentTypeUpdateArgs {
	name:			String
	description:	String
}

type Query {
	personDocumentTypes: [PersonDocumentType!]! @authorized @has(permissions: [ReadPersonDocumentType])
	activePersonDocumentTypes: [PersonDocumentType!]! @authorized @has(permissions: [ReadPersonDocumentType])
	personDocumentType(id: Int!): PersonDocumentType! @authorized @has(permissions: [ReadPersonDocumentType])
}

type Mutation {
	createPersonDocumentType(data: IPersonDocumentTypeCreateArgs!): PersonDocumentType! @authorized @has(permissions: [WritePersonDocumentType])
	updatePersonDocumentType(id: Int!, data: IPersonDocumentTypeUpdateArgs!): PersonDocumentType! @authorized @has(permissions: [WritePersonDocumentType])
	deletePersonDocumentType(id: Int!): PersonDocumentType! @authorized @has(permissions: [WritePersonDocumentType])
}

type Subscription {
	personDocumentTypeCreated: PersonDocumentType!
	personDocumentTypeUpdated: PersonDocumentType!
	personDocumentTypeDeleted: PersonDocumentType!
	personDocumentTypeUpserted: PersonDocumentType!
}
