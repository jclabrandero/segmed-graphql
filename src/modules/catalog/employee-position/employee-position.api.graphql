
type EmployeePosition {
	id:				Int!
	name:			String!
	description:	String
	
	status:			Int!
}


input IEmployeePositionCreateArgs {
	name:			String!
	description:	String
}

input IEmployeePositionUpdateArgs {
	name:			String
	description:	String
}

type Query {
	employeePositions: [EmployeePosition!]! @authorized @has(permissions: [ReadEmployeePosition])
	activeEmployeePositions: [EmployeePosition!]! @authorized @has(permissions: [ReadEmployeePosition])
	employeePosition(id: Int!): EmployeePosition! @authorized @has(permissions: [ReadEmployeePosition])
}

type Mutation {
	createEmployeePosition(data: IEmployeePositionCreateArgs!): EmployeePosition! @authorized @has(permissions: [WriteEmployeePosition])
	updateEmployeePosition(id: Int!, data: IEmployeePositionUpdateArgs!): EmployeePosition! @authorized @has(permissions: [WriteEmployeePosition])
	deleteEmployeePosition(id: Int!): EmployeePosition! @authorized @has(permissions: [WriteEmployeePosition])
}

type Subscription {
	employeePositionCreated: EmployeePosition!
	employeePositionUpdated: EmployeePosition!
	employeePositionDeleted: EmployeePosition!
	employeePositionUpserted: EmployeePosition!
}
