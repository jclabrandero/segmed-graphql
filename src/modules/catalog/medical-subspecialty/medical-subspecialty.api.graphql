
type MedicalSubspecialty {
	id:		Int!
	name:	String!

	description:		String
	ageRangePatients:	String

	dt:	String	#	Diagnostic (D) or Therapeutic (T)
	si:	String	#	Surgical (S) or Internal Medicine (I)
	ot:	String	#	Organ-based (O) or Technique-based (T)

	status:			Int!
}


input IMedicalSubspecialtyCreateArgs {
	name:				String!
	description:		String
	ageRangePatients:	String

	dt:	String
	si:	String
	ot:	String
}

input IMedicalSubspecialtyUpdateArgs {
	name:				String
	description:		String
	ageRangePatients:	String

	dt:	String
	si:	String
	ot:	String
}

type Query {
	medicalSubspecialties: [MedicalSubspecialty!]! @authorized @has(permissions: [ReadMedicalSubspecialty])
	activeMedicalSubspecialties: [MedicalSubspecialty!]! @authorized @has(permissions: [ReadMedicalSubspecialty])
	medicalSubspecialty(id: Int!): MedicalSubspecialty! @authorized @has(permissions: [ReadMedicalSubspecialty])
}

type Mutation {
	createMedicalSubspecialty(data: IMedicalSubspecialtyCreateArgs!): MedicalSubspecialty! @authorized @has(permissions: [WriteMedicalSubspecialty])
	updateMedicalSubspecialty(id: Int!, data: IMedicalSubspecialtyUpdateArgs!): MedicalSubspecialty! @authorized @has(permissions: [WriteMedicalSubspecialty])
	deleteMedicalSubspecialty(id: Int!): MedicalSubspecialty! @authorized @has(permissions: [WriteMedicalSubspecialty])
}

type Subscription {
	medicalSubspecialtyCreated: MedicalSubspecialty!
	medicalSubspecialtyUpdated: MedicalSubspecialty!
	medicalSubspecialtyDeleted: MedicalSubspecialty!
	medicalSubspecialtyUpserted: MedicalSubspecialty!
}
