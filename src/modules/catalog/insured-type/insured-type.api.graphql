
type InsuredType {
	id:				Int!
	name:			String!
	description:	String
	withDependents:	Boolean!

	status:			Int!
}


input IInsuredTypeCreateArgs {
	name:			String!
	description:	String
	withDependents:	Boolean!
}

input IInsuredTypeUpdateArgs {
	name:			String
	description:	String
	withDependents:	Boolean
}

type Query {
	insuredTypes: [InsuredType!]! @authorized @has(permissions: [ReadInsuredType])
	activeInsuredTypes: [InsuredType!]! @authorized @has(permissions: [ReadInsuredType])
	insuredType(id: Int!): InsuredType! @authorized @has(permissions: [ReadInsuredType])
}

type Mutation {
	createInsuredType(data: IInsuredTypeCreateArgs!): InsuredType! @authorized @has(permissions: [WriteInsuredType])
	updateInsuredType(id: Int!, data: IInsuredTypeUpdateArgs!): InsuredType! @authorized @has(permissions: [WriteInsuredType])
	deleteInsuredType(id: Int!): InsuredType! @authorized @has(permissions: [WriteInsuredType])
}

type Subscription {
	insuredTypeCreated: InsuredType!
	insuredTypeUpdated: InsuredType!
	insuredTypeDeleted: InsuredType!
	insuredTypeUpserted: InsuredType!
}
