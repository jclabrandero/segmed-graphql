
type MedicalOffice {
	id:			Int!
	name:		String!
	
	status:		Int!

	belonging:	Belonging!
}


input IMedicalOfficeCreateArgs {
	name:			String!
	belongingId:	Int!
}

input IMedicalOfficeUpdateArgs {
	name:			String
	belongingId:	Int
}

type Query {
	medicalOffices: [MedicalOffice!]! @authorized @has(permissions: [ReadMedicalOffice])
	activeMedicalOffices: [MedicalOffice!]! @authorized @has(permissions: [ReadMedicalOffice])
	medicalOffice(id: Int!): MedicalOffice! @authorized @has(permissions: [ReadMedicalOffice])
}

type Mutation {
	createMedicalOffice(data: IMedicalOfficeCreateArgs!): MedicalOffice! @authorized @has(permissions: [WriteMedicalOffice])
	updateMedicalOffice(id: Int!, data: IMedicalOfficeUpdateArgs!): MedicalOffice! @authorized @has(permissions: [WriteMedicalOffice])
	deleteMedicalOffice(id: Int!): MedicalOffice! @authorized @has(permissions: [WriteMedicalOffice])
}

type Subscription {
	medicalOfficeCreated: MedicalOffice!
	medicalOfficeUpdated: MedicalOffice!
	medicalOfficeDeleted: MedicalOffice!
	medicalOfficeUpserted: MedicalOffice!
}
