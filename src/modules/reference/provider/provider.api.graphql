
type Provider {
	id:				Int!
	vendorCode:		String!
	businessName:	String!
	nit:			String
	address:		String
	phone:			String

	status:			Int!

	belonging:		Belonging!
	medicalGroups:	[MedicalGroup!]!
}


input IProviderMedicalSpecialty {
	medicalSpecialtyId:	Int!
	subspecialties:		[Int!]!
}

input IProviderMedicalGroup {
	medicalGroupId:	Int!
	specialties:	[IProviderMedicalSpecialty!]!
}

input IProviderCreateArgs {
	vendorCode:		String!
	businessName:	String!
	nit:			String
	address:		String
	phone:			String

	belongingId:	Int!
	medicalGroups:	[IProviderMedicalGroup!]
}

input IProviderUpdateArgs {
	businessName:	String
	nit:			String
	address:		String
	phone:			String

	belongingId:	Int
}

input IProviderFilterArgs {
	belongingId:	Int
	medicalGroupId:	Int
}

type Query {
	providers: [Provider!]! @authorized @has(permissions: [ReadProvider])
	activeProviders(query: IProviderFilterArgs!): [Provider!]! @authorized @has(permissions: [ReadProvider])
	provider(id: Int!): Provider! @authorized @has(permissions: [ReadProvider])
}

type Mutation {
	createProvider(data: IProviderCreateArgs!): Provider! @authorized @has(permissions: [WriteProvider])
	updateProvider(id: Int!, data: IProviderUpdateArgs!): Provider! @authorized @has(permissions: [WriteProvider])
	deleteProvider(id: Int!): Provider! @authorized @has(permissions: [WriteProvider])
}

type Subscription {
	providerCreated: Provider!
	providerUpdated: Provider!
	providerDeleted: Provider!
	providerUpserted: Provider!
}
